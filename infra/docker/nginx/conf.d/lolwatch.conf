# lolwatch (別プロジェクト、/home/deploy/lolwatch) 用のリバースプロキシ設定。
# 同一nginxコンテナに相乗りしているためこのディレクトリに置いている。
# TLS証明書の運用はdefault.confのheijiseiji.ddns.netと同じ(certbot / /etc/letsencrypt)。

limit_req_zone $binary_remote_addr zone=lolwatch:10m rate=10r/s;

upstream lolwatch_app_upstream {
  server lolwatch-app:3000;
}

server {
  listen 80;
  server_name lolwatch.ddns.net lol-watch.com;

  # certbot HTTP-01 challenge用
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name lolwatch.ddns.net;
  server_tokens off;

  ssl_certificate     /etc/letsencrypt/live/lolwatch.ddns.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lolwatch.ddns.net/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  limit_req zone=lolwatch burst=20 nodelay;

  location / {
    proxy_pass http://lolwatch_app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# 正式ドメイン。証明書はlolwatch.ddns.netと別発行(SANでまとめず単独ドメインのcertとする)。
server {
  listen 443 ssl;
  server_name lol-watch.com;
  server_tokens off;

  ssl_certificate     /etc/letsencrypt/live/lol-watch.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lol-watch.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  limit_req zone=lolwatch burst=20 nodelay;

  location / {
    proxy_pass http://lolwatch_app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
