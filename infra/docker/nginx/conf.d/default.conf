# リバースプロキシ設定(docs/design/01-basic-design.md §9)
# TLS証明書はcertbot(infra/scripts/provision-vps.sh)で発行し、
# /etc/letsencrypt をこのコンテナにマウントして参照する想定。

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

upstream web_upstream {
  server web:3000;
}

upstream api_upstream {
  server api:3001;
}

server {
  listen 80;
  server_name heijiseiji.ddns.net;

  # certbot HTTP-01 challenge用
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name heijiseiji.ddns.net;
  server_tokens off;

  ssl_certificate     /etc/letsencrypt/live/heijiseiji.ddns.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/heijiseiji.ddns.net/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  limit_req zone=general burst=20 nodelay;

  location /api/ {
    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ヘルスチェック(監視ツール等からの疎通確認用)
  location = /health {
    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
  }

  location / {
    proxy_pass http://web_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
