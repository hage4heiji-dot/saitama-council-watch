# docs/design/01-basic-design.md §9, docs/adr/0003, docs/adr/0008
# 実行例: docker compose -f infra/docker/compose.yml --env-file ../../.env up -d
# ビルドコンテキストはリポジトリルート(このファイルからの相対パス ../..)。

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # certbot(ホスト側で実行)と同じ場所を参照する必要があるため、
      # 名前付きボリュームではなくホストのパスを直接bindする。
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3001/api/v1
      INTERNAL_API_BASE_URL: http://api:3001
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/server.js"]
    env_file:
      - ../../.env
    volumes:
      - ../../data/raw:/data/raw
      - ../../data/sqlite:/data/sqlite
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/batch/runner.js"]
    env_file:
      - ../../.env
    volumes:
      - ../../data/raw:/data/raw
      - ../../data/sqlite:/data/sqlite
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-saitama_council_watch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
